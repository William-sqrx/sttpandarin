<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Fish Animator — Chinesely</title>
<link rel="stylesheet" href="/static/fishgen.css">
</head>
<body>
<header class="topbar">
  <h1>Fish animator</h1>
  <div class="meta">
    <span id="anthropic-status" class="badge">Claude: …</span>
    <span id="pixellab-status" class="badge">PixelLab: …</span>
    <a class="back" href="/">← back</a>
  </div>
</header>

<main>
  <p class="legend">
    Generate your fish on the OpenAI platform, then drop the PNG into any cell.
    Click <strong>Animate</strong> to render a swim-in-place sprite sheet via PixelLab,
    then <strong>Download</strong>.
  </p>
  <div id="grid" class="grid"></div>
</main>

<div id="toast" class="toast" hidden></div>

<template id="cell-template">
  <div class="cell">
    <div class="preview drop-zone" title="Click or drop PNG to upload">
      <img class="still" alt="" hidden>
      <canvas class="sheet" hidden></canvas>
      <div class="placeholder">
        <span class="drop-hint">Drop PNG<br>or click to upload</span>
      </div>
      <div class="overlay" hidden>
        <span class="overlay-text">working…</span>
      </div>
      <input type="file" class="file-input" accept="image/png" style="display:none">
    </div>
    <div class="prompt-block">
      <label class="prompt-label">Image prompt</label>
      <textarea class="prompt" rows="5" spellcheck="false" placeholder="Paste or generate a prompt to use on the OpenAI platform…"></textarea>
      <div class="prompt-actions">
        <button class="btn small suggest-prompt" type="button">Suggest with Claude</button>
      </div>
      <div class="refine-log"></div>
      <div class="refine-row">
        <textarea class="refine-input" rows="2" spellcheck="false" placeholder="Describe what's wrong with the result… e.g. body is too round, fins too small"></textarea>
        <button class="btn small refine-btn" type="button">Refine</button>
      </div>
    </div>
    <div class="prompt-block animate-prompt-block">
      <label class="prompt-label">Animation prompt</label>
      <textarea class="animate-prompt" rows="3" spellcheck="false"></textarea>
    </div>
    <div class="actions">
      <button class="btn secondary animate" type="button" disabled>Animate</button>
      <button class="btn ghost small download" type="button" disabled>Download</button>
      <button class="btn danger small wipe" type="button" title="Delete saved image + sheet" hidden>×</button>
    </div>
    <div class="status" aria-live="polite"></div>
  </div>
</template>

<script src="/static/fishgen.js"></script>
</body>
</html>
