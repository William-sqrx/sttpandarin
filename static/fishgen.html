<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Fish Generator — Chinesely</title>
<link rel="stylesheet" href="/static/fishgen.css">
</head>
<body>
<header class="topbar">
  <h1>Fish generator</h1>
  <div class="meta">
    <span id="openai-status" class="badge">OpenAI: …</span>
    <span id="anthropic-status" class="badge">Claude: …</span>
    <span id="pixellab-status" class="badge">PixelLab: …</span>
    <a class="back" href="/">← back</a>
  </div>
</header>

<main>
  <div class="style-ref-bar">
    <div class="style-ref-label">Style reference (adult)</div>
    <div class="style-ref-slot" id="style-ref-slot">
      <img id="style-ref-img" class="style-ref-thumb" hidden alt="style ref">
      <span id="style-ref-empty" class="style-ref-empty">No reference — adults use text-to-image</span>
    </div>
    <label class="btn small" for="style-ref-input">Upload PNG</label>
    <input type="file" id="style-ref-input" accept="image/png" style="display:none">
    <button class="btn danger small" id="style-ref-clear" hidden>Remove</button>
  </div>
  <div id="grid" class="grid"></div>
</main>

<div id="toast" class="toast" hidden></div>

<template id="cell-template">
  <div class="cell">
    <div class="preview">
      <img class="still" alt="" hidden>
      <canvas class="sheet" hidden></canvas>
      <div class="placeholder">no image</div>
      <div class="overlay" hidden>
        <span class="overlay-text">working…</span>
      </div>
    </div>
    <div class="prompt-block">
      <textarea class="prompt" rows="6" spellcheck="false"></textarea>
      <div class="prompt-actions">
        <button class="btn small suggest-prompt" type="button">Suggest with Claude</button>
      </div>
    </div>
    <div class="actions">
      <button class="btn primary generate" type="button">Generate</button>
      <button class="btn secondary animate" type="button" disabled>Animate</button>
      <button class="btn ghost small download" type="button" disabled>Download</button>
      <button class="btn danger small wipe" type="button" title="Delete saved image + sheet" hidden>×</button>
    </div>
    <div class="status" aria-live="polite"></div>
  </div>
</template>

<script src="/static/fishgen.js"></script>
</body>
</html>
